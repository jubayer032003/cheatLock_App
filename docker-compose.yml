version: "3.8"

services:
  mongodb:
    image: mongo:6.0
    container_name: cheatlock_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: cheatlock_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2023-09-07T01-16-47Z
    container_name: cheatlock_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: cheatlock_admin
      MINIO_ROOT_PASSWORD: cheatlock_secret
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cheatlock_backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/cheatlock
      - JWT_SECRET=production_enterprise_jwt_secret_key_123!
      - REDIS_URL=redis://redis:6379
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=cheatlock_admin
      - S3_SECRET_KEY=cheatlock_secret
      - S3_BUCKET=cheatlock-telemetry
    depends_on:
      - mongodb
      - redis
      - minio

  dashboard:
    build:
      context: ./web-dashboard
      dockerfile: Dockerfile
    container_name: cheatlock_dashboard
    depends_on:
      - backend

  nginx:
    image: nginx:1.25-alpine
    container_name: cheatlock_proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ssl_certs:/etc/nginx/ssl
    depends_on:
      - backend
      - dashboard

volumes:
  mongo_data:
  minio_data:
  ssl_certs:
